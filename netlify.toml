[build]
publish = "."

[functions]
directory = "functions"
# esbuild handles both CommonJS (gemini.js, chat.js) and ESM v2 functions
# (chat.mjs, recipes-get.mjs, recipes-post.mjs) correctly.
node_bundler = "esbuild"

[build.environment]
NODE_VERSION = "18"

# ── Required environment variables ──────────────────────────────────────────
# Set these in the Netlify dashboard → Site settings → Environment variables.
#
#   GEMINI_API_KEY     — Google Gemini API key (get free key at aistudio.google.com)
#                        Required for /.netlify/functions/gemini (AI assistant)
#                        Required for /.netlify/functions/chat (AI fallback)
#
#   SUPABASE_URL         — Supabase project URL
#                          Required for /.netlify/functions/recipes-get
#                          Required for /.netlify/functions/recipes-post
#                          Required for /.netlify/functions/products-get
#                          Required for /.netlify/functions/products-admin
#
#   SUPABASE_ANON_KEY    — Supabase anonymous (public) key
#                          Required for /.netlify/functions/recipes-get
#                          Required for /.netlify/functions/recipes-post
#                          Required for /.netlify/functions/products-get
#                          Required for /.netlify/functions/products-admin
#
#   SUPABASE_SERVICE_KEY — Supabase service_role key (bypasses RLS for admin writes)
#                          Found in: Supabase Dashboard → Project Settings → API → service_role
#                          Required for /.netlify/functions/products-admin
#
#   ADMIN_SECRET         — Any strong password you choose (protects /admin/products.html)
#                          Required for /.netlify/functions/products-admin
#
# ── VIP / Mailchimp sync ────────────────────────────────────────────────────
#
#   MAILCHIMP_API_KEY        — Mailchimp API key
#                              Found in: Mailchimp → Account → Extras → API keys
#                              Required for /.netlify/functions/mailchimp-sync
#
#   MAILCHIMP_SERVER_PREFIX  — Mailchimp data center prefix (e.g. "us21")
#                              Found at the end of your Mailchimp API endpoint URL
#                              Required for /.netlify/functions/mailchimp-sync
#
#   MAILCHIMP_AUDIENCE_ID    — Mailchimp list/audience ID
#                              Found in: Mailchimp → Audience → Settings → Audience name and defaults
#                              Required for /.netlify/functions/mailchimp-sync
#
#   SUPABASE_SERVICE_ROLE_KEY — Also used by mailchimp-sync to insert leads
#                               (already documented above as SUPABASE_SERVICE_KEY)
# ─────────────────────────────────────────────────────────────────────────────

# ── HTML pages: never cache (content changes on each deploy) ────────────────
[[headers]]
for = "/*"
[headers.values]
Cache-Control = "max-age=0, no-cache, no-store, must-revalidate"
X-Frame-Options = "DENY"

# ── Static assets: cache 1 year, immutable (filenames don't change often) ───
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.{png,jpg,jpeg,webp,avif,svg}"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
